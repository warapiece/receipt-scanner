<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>レシートスキャナー</title>
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>

  <!-- ホーム画面 -->
  <div id="view-home" class="view active">
    <div class="header">
      <div class="mode-toggle">
        <button id="mode-btn-beginner" class="mode-btn active" onclick="setMode('beginner')">かんたん</button>
        <button id="mode-btn-pro" class="mode-btn" onclick="setMode('pro')">プロ版</button>
      </div>
      <button class="icon-btn" onclick="showSettings()">⚙️</button>
    </div>

    <!-- 未設定バナー -->
    <div id="setup-banner" class="setup-banner" style="display:none">
      ⚠️ 設定がまだです &nbsp;<button onclick="showSettings()">設定する →</button>
    </div>

    <!-- かんたんモード -->
    <div id="home-beginner" class="home-content">
      <p class="home-lead">レシートを撮影して記録</p>
      <div class="camera-area" onclick="triggerCapture()">
        <div class="camera-icon">📷</div>
        <p>ここをタップして撮影</p>
      </div>
      <label class="btn-sub-upload">
        ギャラリーから選ぶ
        <input type="file" id="file-gallery-b" accept="image/*" onchange="handleFile(this)" style="display:none">
      </label>
      <button class="btn-manual" onclick="openManualInput()">✏️ 手動で入力する</button>
    </div>

    <!-- プロ版モード -->
    <div id="home-pro" class="home-content" style="display:none">
      <p class="home-lead">レシートを撮影して記録</p>
      <div class="camera-area" onclick="triggerCapture()">
        <div class="camera-icon">📷</div>
        <p>ここをタップして撮影</p>
      </div>
      <label class="btn-secondary">
        ギャラリーから選ぶ
        <input type="file" id="file-gallery-p" accept="image/*" onchange="handleFile(this)" style="display:none">
      </label>
      <button class="btn-manual" onclick="openManualInput()">✏️ 手動で入力する</button>
    </div>

    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handleFile(this)" style="display:none">
  </div>

  <!-- 処理中 -->
  <div id="view-processing" class="view">
    <div class="processing-content">
      <div class="spinner"></div>
      <p class="processing-text">読み取り中...</p>
      <p class="processing-sub">少しお待ちください</p>
    </div>
  </div>

  <!-- かんたん確認画面 -->
  <div id="view-review-beginner" class="view">
    <div class="header">
      <button class="back-btn" onclick="showHome()">← 戻る</button>
      <h2>確認</h2>
      <div></div>
    </div>
    <div class="review-simple">
      <div class="review-field">
        <label>日付</label>
        <input type="text" id="b-date" placeholder="YYYY/MM/DD">
      </div>
      <div class="review-field">
        <label>店舗名 / 会社名</label>
        <input type="text" id="b-store" placeholder="店舗名・会社名">
      </div>
      <div class="review-field">
        <label>内容</label>
        <select id="b-category" class="select-category">
          <option value="">── 選択してください ──</option>
          <option value="キャラクター景品代">キャラクター景品代</option>
          <option value="移動費">移動費</option>
          <option value="会場費">会場費</option>
          <option value="飲食費">飲食費</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="review-total-block">
        <label>金額<span class="check-label">← 確認してください</span></label>
        <div class="total-row">
          <span class="yen">¥</span>
          <input type="number" id="b-total" inputmode="numeric" placeholder="0">
        </div>
      </div>
      <button class="btn-record" onclick="saveToSheet('beginner')">記録する</button>
      <button class="btn-cancel" onclick="showHome()">やり直す</button>
    </div>
  </div>

  <!-- プロ版確認画面 -->
  <div id="view-review-pro" class="view">
    <div class="header">
      <button class="back-btn" onclick="showHome()">← 戻る</button>
      <h2>内容確認・修正</h2>
      <div></div>
    </div>
    <div class="review-pro">
      <div class="review-field">
        <label>日付</label>
        <input type="text" id="p-date" placeholder="YYYY/MM/DD">
      </div>
      <div class="review-field">
        <label>店舗名 / 会社名</label>
        <input type="text" id="p-store" placeholder="店舗名・会社名">
      </div>
      <div class="review-field">
        <label>内容</label>
        <select id="p-category" class="select-category">
          <option value="">── 選択してください ──</option>
          <option value="キャラクター景品代">キャラクター景品代</option>
          <option value="移動費">移動費</option>
          <option value="会場費">会場費</option>
          <option value="飲食費">飲食費</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="items-section">
        <div class="items-header">
          <label>品目一覧</label>
          <span id="item-count" class="item-count"></span>
        </div>
        <div id="items-list"></div>
        <button class="btn-recalc" onclick="recalcTotal()">↺ 品目から合計を再計算</button>
      </div>
      <div class="review-total-block">
        <label>金額<span class="check-label">← 最終確認</span></label>
        <div class="total-row">
          <span class="yen">¥</span>
          <input type="number" id="p-total" inputmode="numeric" placeholder="0">
        </div>
      </div>
      <button class="btn-record" onclick="saveToSheet('pro')">スプレッドシートに記録する</button>
      <button class="btn-cancel" onclick="showHome()">やり直す</button>
    </div>
  </div>

  <!-- 成功画面 -->
  <div id="view-success" class="view">
    <div class="success-content">
      <div class="success-icon">✅</div>
      <h2>記録しました！</h2>
      <div class="success-card" id="success-card"></div>
      <a id="sheet-link" href="#" target="_blank" class="btn-sheet-link">スプレッドシートを確認 →</a>
      <button class="btn-record" onclick="showHome()">続けて撮影する</button>
    </div>
  </div>

  <!-- 設定画面 -->
  <div id="view-settings" class="view">
    <div class="header">
      <button class="back-btn" onclick="showHome()">← 戻る</button>
      <h2>設定</h2>
      <div></div>
    </div>
    <div class="settings-content">
      <div class="settings-group">
        <label>GAS URL <span class="label-hint">（Google Apps ScriptのデプロイURL）</span></label>
        <input type="url" id="s-gas" placeholder="https://script.google.com/macros/s/...">
        <p class="settings-note">
          設定方法 →
          <a href="https://github.com/warapiece/receipt-scanner#セットアップ手順" target="_blank">README を見る</a>
        </p>
      </div>
      <div class="settings-group">
        <label>スプレッドシート URL</label>
        <input type="url" id="s-sheet" placeholder="https://docs.google.com/spreadsheets/d/...">
        <button class="btn-create" id="btn-create" onclick="createSheet()">➕ 新規作成する</button>
        <div id="create-status" class="create-status"></div>
      </div>
      <div class="settings-group">
        <label>シート名 <span class="label-hint">（省略可）</span></label>
        <input type="text" id="s-name" placeholder="空白 = 最初のシート">
      </div>
      <button class="btn-record" onclick="saveSettings()">保存する</button>
      <div id="save-status" class="save-status"></div>

      <div class="col-info">
        <p class="col-title">書き込み列</p>
        <div class="col-row"><span>A列</span><span>日付</span></div>
        <div class="col-row"><span>B列</span><span>店舗名 / 会社名</span></div>
        <div class="col-row"><span>C列</span><span>内容</span></div>
        <div class="col-row"><span>D列</span><span>金額（円）</span></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/app.js?v=5"></script>
</body>
</html>
